name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build with Buildozer
        uses: ArtemSBulat/buildozer-action@v1
        with:
          command: buildozer android debug
          repository_root: .
